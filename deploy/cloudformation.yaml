AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  dhcp-tee — passive DHCP visibility tee for AWS. Creates the VPC Traffic
  Mirroring plumbing (filter + rule + target + one session per Infoblox DHCP
  ENI), a least-privilege security group, and the reformatter EC2 instance that
  runs dhcp-tee. The instance builds and installs dhcp-tee from source via
  user-data and manages itself through SSM (no SSH key required).

  Native AWS alternative to the Terraform in main.tf. Deploy with:
    aws cloudformation deploy --template-file deploy/cloudformation.yaml \
      --stack-name dhcp-tee --capabilities CAPABILITY_IAM \
      --parameter-overrides VpcId=vpc-… SubnetId=subnet-… \
        InfobloxEni1=eni-… ToolIps=10.0.0.10 \
        InfobloxCidr=10.0.0.0/16 ToolCidr=10.0.0.0/16
  …or upload it in the CloudFormation console and fill in the parameters.

################################################################################
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: { default: "Network" }
        Parameters: [VpcId, SubnetId, AssignPublicIp]
      - Label: { default: "Mirror sources (Infoblox DHCP-serving ENIs)" }
        Parameters: [InfobloxEni1, InfobloxEni2, InfobloxEni3, InfobloxEni4]
      - Label: { default: "Visibility tools" }
        Parameters: [ToolIps]
      - Label: { default: "Security group scoping" }
        Parameters: [InfobloxCidr, ToolCidr]
      - Label: { default: "Reformatter instance" }
        Parameters: [InstanceType, ImageId, RepoUrl, RepoRef]

################################################################################
Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC that holds the Infoblox ENIs and the reformatter.

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: >-
      Subnet for the reformatter ENI. It must have outbound internet (NAT
      gateway or public + IGW) or SSM/GitHub/Go-proxy VPC endpoints, since
      user-data builds dhcp-tee from source and the host is managed via SSM.

  AssignPublicIp:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: >-
      Set true to attach an Elastic IP to the reformatter (use when SubnetId is
      a public subnet). Leave false for private subnets with NAT.

  InfobloxEni1:
    Type: String
    Description: >-
      First DHCP-serving Infoblox ENI to mirror (the SERVICE interface, not
      LAN1/management). e.g. eni-0123456789abcdef0
    AllowedPattern: "eni-[0-9a-f]+"

  InfobloxEni2:
    Type: String
    Default: ""
    Description: Optional second Infoblox ENI (HA pair / Grid member).

  InfobloxEni3:
    Type: String
    Default: ""
    Description: Optional third Infoblox ENI.

  InfobloxEni4:
    Type: String
    Default: ""
    Description: Optional fourth Infoblox ENI.

  ToolIps:
    Type: String
    Description: >-
      Comma-separated visibility tool IP(s) that receive relayed DHCP on UDP/67.
      e.g. 10.0.0.10 or 10.0.0.10,10.0.0.11
    AllowedPattern: "([0-9]{1,3}\\.){3}[0-9]{1,3}(,([0-9]{1,3}\\.){3}[0-9]{1,3})*"

  InfobloxCidr:
    Type: String
    Default: 10.0.0.0/8
    Description: >-
      CIDR the mirrored VXLAN (UDP/4789) arrives from — typically the VPC CIDR
      or the Infoblox subnet CIDR.
    AllowedPattern: "([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}"

  ToolCidr:
    Type: String
    Default: 10.0.0.0/8
    Description: CIDR the visibility tools live in (egress UDP/67 is allowed to it).
    AllowedPattern: "([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}"

  InstanceType:
    Type: String
    Default: t4g.small
    Description: >-
      Reformatter instance type. DHCP is bursty, not a stream, so small is fine.
      The default (t4g, arm64) must match the ImageId architecture below.

  ImageId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64
    Description: >-
      AMI for the reformatter, auto-resolved to the latest Amazon Linux 2023.
      Use the arm64 path for t4g/Graviton (default) or the x86_64 path
      (/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64)
      for x86 instance types.

  RepoUrl:
    Type: String
    Default: https://github.com/apadua/DHCP-Visibility-tee.git
    Description: Git URL the instance clones to build dhcp-tee.

  RepoRef:
    Type: String
    Default: main
    Description: Git branch or tag to build.

################################################################################
Conditions:
  HasEni2: !Not [!Equals [!Ref InfobloxEni2, ""]]
  HasEni3: !Not [!Equals [!Ref InfobloxEni3, ""]]
  HasEni4: !Not [!Equals [!Ref InfobloxEni4, ""]]
  AssignEip: !Equals [!Ref AssignPublicIp, "true"]

################################################################################
Resources:
  # --- Mirror filter: inbound DHCP client requests only (UDP/67) --------------
  # Traffic reaching the Infoblox ENI is already relayed (relay_ip:67 ->
  # infoblox:67), so a single ingress rule on UDP/67 isolates client requests
  # and excludes the server's replies, keeping mirror volume near zero.
  MirrorFilter:
    Type: AWS::EC2::TrafficMirrorFilter
    Properties:
      Description: DHCP client requests only
      Tags:
        - { Key: Name, Value: dhcp-tee }

  MirrorFilterRule:
    Type: AWS::EC2::TrafficMirrorFilterRule
    Properties:
      Description: inbound UDP/67 (DHCP to server)
      TrafficMirrorFilterId: !Ref MirrorFilter
      TrafficDirection: ingress
      RuleNumber: 100
      RuleAction: accept
      Protocol: 17 # UDP
      SourceCidrBlock: 0.0.0.0/0
      DestinationCidrBlock: 0.0.0.0/0
      DestinationPortRange: { FromPort: 67, ToPort: 67 }

  # --- Security group for the reformatter ENI ---------------------------------
  ReformatterSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "dhcp-tee: receive VXLAN mirror, send relayed DHCP to tools"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - Description: VXLAN traffic-mirror payload from Infoblox ENIs
          IpProtocol: udp
          FromPort: 4789
          ToPort: 4789
          CidrIp: !Ref InfobloxCidr
      SecurityGroupEgress:
        - Description: relayed DHCP to visibility tools
          IpProtocol: udp
          FromPort: 67
          ToPort: 67
          CidrIp: !Ref ToolCidr
        - Description: https for SSM, package install, and source build
          IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - Description: http for package mirrors
          IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - { Key: Name, Value: dhcp-tee-reformatter }

  # --- Reformatter ENI (this is the mirror target) ----------------------------
  ReformatterEni:
    Type: AWS::EC2::NetworkInterface
    Properties:
      Description: dhcp-tee reformatter (mirror target)
      SubnetId: !Ref SubnetId
      GroupSet: [!Ref ReformatterSG]
      # Source/dest check stays ENABLED on purpose: copies leave with this ENI's
      # real address (we never spoof the relay IP), so no need to disable it.
      Tags:
        - { Key: Name, Value: dhcp-tee-reformatter }

  ReformatterEip:
    Condition: AssignEip
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  ReformatterEipAssoc:
    Condition: AssignEip
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt ReformatterEip.AllocationId
      NetworkInterfaceId: !Ref ReformatterEni

  # --- IAM: SSM-managed, no SSH key needed ------------------------------------
  ReformatterRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Tags:
        - { Key: Name, Value: dhcp-tee-reformatter }

  ReformatterProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref ReformatterRole]

  # --- Reformatter instance ---------------------------------------------------
  ReformatterInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref ImageId
      IamInstanceProfile: !Ref ReformatterProfile
      NetworkInterfaces:
        - NetworkInterfaceId: !Ref ReformatterEni
          DeviceIndex: 0
      Tags:
        - { Key: Name, Value: dhcp-tee-reformatter }
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail

          # Tooling: Go to build the static binary, iproute2 for the vxlan0 link.
          dnf install -y git golang iproute tar gzip

          useradd -r -s /usr/sbin/nologin dhcp-tee || true

          rm -rf /opt/dhcp-tee-src
          git clone --depth 1 --branch "${RepoRef}" "${RepoUrl}" /opt/dhcp-tee-src
          cd /opt/dhcp-tee-src

          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o /usr/local/bin/dhcp-tee .

          install -m0755 setup-vxlan.sh   /usr/local/sbin/setup-vxlan.sh
          install -m0644 vxlan0.service   /etc/systemd/system/vxlan0.service
          install -m0644 dhcp-tee.service /etc/systemd/system/dhcp-tee.service

          # Inject the tool IP(s) without editing the shipped unit.
          mkdir -p /etc/systemd/system/dhcp-tee.service.d
          cat >/etc/systemd/system/dhcp-tee.service.d/override.conf <<'EOF'
          [Service]
          Environment=DHCP_TEE_TOOLS=${ToolIps}
          EOF

          systemctl daemon-reload
          systemctl enable --now vxlan0.service dhcp-tee.service

  # --- Mirror target: the reformatter ENI -------------------------------------
  MirrorTarget:
    Type: AWS::EC2::TrafficMirrorTarget
    Properties:
      Description: dhcp-tee reformatter
      NetworkInterfaceId: !Ref ReformatterEni
      Tags:
        - { Key: Name, Value: dhcp-tee }

  # --- One session per DHCP-serving Infoblox ENI ------------------------------
  # VirtualNetworkId is intentionally omitted so AWS auto-assigns a VNI per
  # session; vxlan0 in external/collect_metadata mode accepts any VNI.
  # packet_length is omitted on purpose = mirror the ENTIRE packet; truncation
  # would chop DHCP options and starve fingerprinting.
  MirrorSession1:
    Type: AWS::EC2::TrafficMirrorSession
    Properties:
      Description: !Sub "mirror DHCP from ${InfobloxEni1}"
      NetworkInterfaceId: !Ref InfobloxEni1
      TrafficMirrorTargetId: !Ref MirrorTarget
      TrafficMirrorFilterId: !Ref MirrorFilter
      SessionNumber: 1

  MirrorSession2:
    Condition: HasEni2
    Type: AWS::EC2::TrafficMirrorSession
    Properties:
      Description: !Sub "mirror DHCP from ${InfobloxEni2}"
      NetworkInterfaceId: !Ref InfobloxEni2
      TrafficMirrorTargetId: !Ref MirrorTarget
      TrafficMirrorFilterId: !Ref MirrorFilter
      SessionNumber: 1

  MirrorSession3:
    Condition: HasEni3
    Type: AWS::EC2::TrafficMirrorSession
    Properties:
      Description: !Sub "mirror DHCP from ${InfobloxEni3}"
      NetworkInterfaceId: !Ref InfobloxEni3
      TrafficMirrorTargetId: !Ref MirrorTarget
      TrafficMirrorFilterId: !Ref MirrorFilter
      SessionNumber: 1

  MirrorSession4:
    Condition: HasEni4
    Type: AWS::EC2::TrafficMirrorSession
    Properties:
      Description: !Sub "mirror DHCP from ${InfobloxEni4}"
      NetworkInterfaceId: !Ref InfobloxEni4
      TrafficMirrorTargetId: !Ref MirrorTarget
      TrafficMirrorFilterId: !Ref MirrorFilter
      SessionNumber: 1

################################################################################
Outputs:
  ReformatterInstanceId:
    Description: EC2 instance id of the reformatter (open a shell via SSM Session Manager).
    Value: !Ref ReformatterInstance

  ReformatterEniId:
    Description: Reformatter ENI (the mirror target).
    Value: !Ref ReformatterEni

  ReformatterSecurityGroupId:
    Description: Security group attached to the reformatter ENI.
    Value: !Ref ReformatterSG

  MirrorFilterId:
    Value: !Ref MirrorFilter

  MirrorTargetId:
    Value: !Ref MirrorTarget

  ReformatterPublicIp:
    Condition: AssignEip
    Description: Elastic IP (only when AssignPublicIp=true).
    Value: !Ref ReformatterEip

  TrustedRelayReminder:
    Description: >-
      Add the reformatter's ENI IP to each visibility tool's trusted-relay /
      source allowlist, or the tool will silently drop the feed.
    Value: !Sub "reformatter ENI ${ReformatterEni} — allowlist its private IP on your tool(s)"
